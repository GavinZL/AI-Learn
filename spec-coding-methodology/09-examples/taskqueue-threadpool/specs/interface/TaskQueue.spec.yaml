## Classes

### TaskQueue

```yaml
TaskQueue:
  description: |
    @require FR-001, FR-002
    @adr ADR-001
    High-level API for task execution.
  constructors:
    - signature: "TaskQueue(QueueType type)"
      description: Create queue with specified type
    - signature: "TaskQueue(QueueType type, std::string name)"
      description: Create named queue for debugging
  
  methods:
    - name: async
      signature: "template<typename F> auto async(F&& f) -> TaskFuture<invoke_result_t<F>>"
      requirement_ref: FR-001
      description: Execute task asynchronously
      parameters:
        - name: f
          type: Callable
          description: Task to execute
      returns: Future for retrieving result
      preconditions:
        - Queue is not shutdown
      postconditions:
        - Task is queued for execution
      complexity: O(1) amortized
      thread_safety: Yes
      
    - name: sync
      signature: "template<typename F> auto sync(F&& f) -> invoke_result_t<F>"
      requirement_ref: FR-001
      description: Execute task synchronously
      parameters:
        - name: f
          type: Callable
          description: Task to execute
      returns: Task execution result
      preconditions:
        - Queue is not shutdown
      postconditions:
        - Task has completed execution
      complexity: O(task execution time)
      thread_safety: Yes
      
    - name: after
      signature: "template<typename D, typename F> auto after(D delay, F&& f) -> TaskFuture<invoke_result_t<F>>"
      requirement_ref: FR-001
      description: Execute task after specified delay
      parameters:
        - name: delay
          type: std::chrono::duration
          description: Time to wait before execution
        - name: f
          type: Callable
          description: Task to execute
      returns: Future for retrieving result
      preconditions:
        - Queue is not shutdown
        - delay > 0
      postconditions:
        - Task is scheduled for future execution
      
    - name: wait
      signature: "void wait()"
      requirement_ref: FR-001
      description: Wait for all pending tasks to complete
      postconditions:
        - All submitted tasks have completed
      
    - name: wait_for
      signature: "template<typename D> bool wait_for(D timeout)"
      requirement_ref: FR-001
      description: Wait for all pending tasks with timeout
      parameters:
        - name: timeout
          type: std::chrono::duration
          description: Maximum time to wait
      returns: true if all tasks completed, false if timeout
```

### TaskGroup

```yaml
TaskGroup:
  description: |
    @require FR-004
    @adr ADR-001
    Group multiple tasks for collective management.
  methods:
    - name: add
      signature: "template<typename F> auto add(TaskQueue& queue, F&& f) -> TaskFuture"
      requirement_ref: FR-004
      description: Add task to group
      parameters:
        - name: queue
          type: TaskQueue&
          description: Queue to execute task on
        - name: f
          type: Callable
          description: Task to execute
      returns: Future for retrieving result
      
    - name: wait
      signature: "void wait()"
      requirement_ref: FR-004
      description: Wait for all tasks in group to complete
      
    - name: on_complete
      signature: "void on_complete(TaskQueue& queue, std::function<void()> callback)"
      requirement_ref: FR-004
      description: Set callback to be called when all tasks complete
      parameters:
        - name: queue
          type: TaskQueue&
          description: Queue to execute callback on
        - name: callback
          type: std::function<void()>
          description: Callback function
```

