## Performance Characteristics

| Operation | SerialQueue | ConcurrentQueue | ParallelQueue |
|-----------|-------------|-----------------|---------------|
| async()   | < 1μs       | < 2μs           | < 1μs         |
| sync()    | blocking    | blocking        | blocking      |
| Memory/task | 256 bytes | 256 bytes       | 256 bytes     |

See [NFR-001](../requirements/NFR-001-performance.md) for detailed requirements.
