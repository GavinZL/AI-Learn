## Configuration

```yaml
ConcurrencyPoolConfig:
  description: Configuration for concurrent thread pool
  @adr ADR-003
  properties:
    min_threads:
      type: size_t
      default: 1
      description: Minimum number of threads
    max_threads:
      type: size_t
      default: hardware_concurrency()
      description: Maximum number of threads
    idle_timeout:
      type: std::chrono::milliseconds
      default: 60000
      description: Idle thread timeout before termination
    scale_up_threshold:
      type: double
      default: 0.8
      description: Utilization threshold to scale up
    scale_down_threshold:
      type: double
      default: 0.3
      description: Utilization threshold to scale down
```

---

## Error Handling

### Exceptions

```yaml
exceptions:
  - name: QueueClosedException
    inheritance: std::runtime_error
    description: Thrown when submitting to a closed queue
    requirement_ref: FR-001
    
  - name: TaskCancelledException
    inheritance: std::runtime_error
    description: Thrown when attempting to get result of cancelled task
    requirement_ref: FR-001
```

