# TaskQueue Interface Specification

## Overview

This document defines the interface specifications for the TaskQueue system.

**Requirements Covered**:
- FR-001: Task execution functionality
- FR-002: Queue type support
- FR-003: Thread pool management
- FR-004: Task group management

**Architecture Decisions**:
- ADR-001: Class hierarchy design
- ADR-002: Queue implementation strategy
- ADR-003: Thread scheduling strategy

---

## Core Types

### QueueType

```yaml
QueueType:
  type: enum
  values:
    - Serial:       # @require FR-002
        description: |
          Exclusive thread per queue.
          Tasks execute sequentially on the same thread.
    - Concurrent:   # @require FR-002
        description: |
          Ordered execution start, but may run on different threads.
          Tasks start in submission order but may overlap.
    - Parallel:     # @require FR-002
        description: |
          Maximum parallelism, no ordering guarantees.
          Tasks are distributed across all available threads.
```

### TaskFuture

```yaml
TaskFuture:
  type: template
  parameters:
    - T: Return type of the task
  description: |
    @require FR-001
    Future for retrieving async task results.
  methods:
    - name: get
      signature: "T get()"
      description: Block until task completes and return result
      throws:
        - std::future_error if task was cancelled
    - name: wait
      signature: "void wait() const"
      description: Block until task completes
    - name: valid
      signature: "bool valid() const"
      description: Check if future has a shared state
```

