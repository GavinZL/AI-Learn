## Internal Interfaces

### IQueueImpl

```yaml
IQueueImpl:
  description: |
    @adr ADR-001, ADR-002
    Backend queue implementation interface.
  methods:
    - name: submit
      signature: "void submit(std::unique_ptr<TaskOperator> task)"
      description: Submit task to queue
      
    - name: run
      signature: "void run()"
      description: Start processing tasks
      
    - name: stop
      signature: "void stop()"
      description: Stop processing tasks
```

### IThreadPool

```yaml
IThreadPool:
  description: |
    @adr ADR-001, ADR-003
    Thread pool management interface.
  methods:
    - name: submit
      signature: "void submit(std::function<void()> task)"
      description: Submit task to thread pool
      
    - name: shutdown
      signature: "void shutdown()"
      description: Graceful shutdown
      
    - name: shutdown_now
      signature: "void shutdown_now()"
      description: Immediate shutdown
```

